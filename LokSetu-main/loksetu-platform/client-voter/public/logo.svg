<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="tricolor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF9933"/>
      <stop offset="50%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#138808"/>
    </linearGradient>
    <linearGradient id="saffronGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF9933"/>
      <stop offset="100%" stop-color="#138808"/>
    </linearGradient>
  </defs>

  <!-- Outer circle - navy -->
  <circle cx="100" cy="100" r="95" fill="#0A3D62"/>

  <!-- Tricolor ring -->
  <circle cx="100" cy="100" r="88" fill="none" stroke="url(#tricolor)" stroke-width="6"/>

  <!-- Inner white circle -->
  <circle cx="100" cy="100" r="82" fill="white"/>

  <!-- Ashoka Chakra style element (simplified 24 spokes) -->
  <circle cx="100" cy="100" r="32" fill="none" stroke="#0A3D62" stroke-width="2.5"/>
  <circle cx="100" cy="100" r="5" fill="#0A3D62"/>
  <g stroke="#0A3D62" stroke-width="1.5" stroke-linecap="round">
    <line x1="100" y1="68" x2="100" y2="80"/>
    <line x1="100" y1="120" x2="100" y2="132"/>
    <line x1="68" y1="100" x2="80" y2="100"/>
    <line x1="120" y1="100" x2="132" y2="100"/>
    <line x1="77.4" y1="77.4" x2="85.9" y2="85.9"/>
    <line x1="114.1" y1="114.1" x2="122.6" y2="122.6"/>
    <line x1="122.6" y1="77.4" x2="114.1" y2="85.9"/>
    <line x1="85.9" y1="114.1" x2="77.4" y2="122.6"/>
    <line x1="83.8" y1="71.7" x2="89.1" y2="82.3"/>
    <line x1="110.9" y1="117.7" x2="116.2" y2="128.3"/>
    <line x1="128.3" y1="83.8" x2="117.7" y2="89.1"/>
    <line x1="82.3" y1="110.9" x2="71.7" y2="116.2"/>
    <line x1="71.7" y1="83.8" x2="82.3" y2="89.1"/>
    <line x1="117.7" y1="110.9" x2="128.3" y2="116.2"/>
    <line x1="116.2" y1="71.7" x2="110.9" y2="82.3"/>
    <line x1="89.1" y1="117.7" x2="83.8" y2="128.3"/>
  </g>

  <!-- Bridge/Setu arches -->
  <path d="M 38 145 Q 58 110 78 145" fill="none" stroke="#FF9933" stroke-width="4" stroke-linecap="round"/>
  <path d="M 78 145 Q 100 108 122 145" fill="none" stroke="#0A3D62" stroke-width="4" stroke-linecap="round"/>
  <path d="M 122 145 Q 142 110 162 145" fill="none" stroke="#138808" stroke-width="4" stroke-linecap="round"/>

  <!-- Checkmark overlay -->
  <path d="M 82 100 L 96 114 L 122 84" fill="none" stroke="url(#saffronGreen)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Platform base line -->
  <line x1="35" y1="148" x2="165" y2="148" stroke="#0A3D62" stroke-width="3" stroke-linecap="round"/>

  <!-- Text: LokSetu -->
  <text x="100" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="18" fill="#0A3D62">LokSetu</text>
</svg>
